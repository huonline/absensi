<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Monitoring Absensi</title>
    
    <link rel="icon" type="image/jpeg" href="LOGO%20HU%20NEW.jpg">
    <link rel="apple-touch-icon" href="LOGO%20HU%20NEW.jpg">
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container container-large">
        <header class="header">
            <h1>Dashboard Super Admin</h1>
            <p>Pusat Monitoring & Grafik Persentase Absensi Santri</p>
            
            <div style="margin-top: 12px;">
                <a href="data-santri.html" class="btn-nav" style="display: inline-block; width: 100%; text-align: center; box-sizing: border-box; padding: 10px;">
                    Kelola Data Santri &rarr;
                </a>
            </div>
        </header>

        <!-- SEKSI 1: GRAFIK PERSENTASE -->
        <section class="admin-section">
            <h2>Persentase</h2>
            <div class="chart-box">
                <canvas id="grafikKehadiran"></canvas>
            </div>
        </section>

        <hr class="divider">

        <!-- SEKSI 2: LAPORAN MASUK -->
        <section class="admin-section">
            <h2>Laporan</h2>

            <div class="filter-box" style="margin-top: 10px; margin-bottom: 15px;">
                <select id="filter-kobong" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-weight: 600; color: #2e7d32; cursor: pointer;">
                    <option value="ALL">-- Lihat Semua Kobong --</option>
                </select>
            </div>

            <!-- TABEL DENGAN KOLOM: Waktu | Kobong | Nama | Ket | Status -->
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Kobong</th>
                            <th>Pelapor</th>
                            <th>Laporan</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-laporan">
                        <tr>
                            <td colspan="5" class="text-center">Memuat data laporan...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
