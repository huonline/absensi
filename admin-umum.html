<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Monitoring Absensi</title>
    
    <link rel="icon" type="image/jpeg" href="LOGO%20HU%20NEW.jpg">
    <link rel="apple-touch-icon" href="LOGO%20HU%20NEW.jpg">
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="style.css">
    <!-- Chart.js CDN untuk Grafik -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container container-large">
        <!-- Header & Navigasi -->
        <header class="header">
            <div class="nav-bar">
                <h1>Dashboard Super Admin</h1>
                <a href="data-santri.html" class="btn-nav">Kelola Data Santri &rarr;</a>
            </div>
            <p>Pusat Monitoring, Grafik Persentase & Konfirmasi Absensi</p>
        </header>

        <!-- SEKSI 1: GRAFIK PERSENTASE KEHADIRAN PER KOBONG -->
        <section class="admin-section">
            <h2>Persentase Kehadiran Per Kobong</h2>
            <div class="chart-box">
                <canvas id="grafikKehadiran"></canvas>
            </div>
        </section>

        <hr class="divider">

        <!-- SEKSI 2: LAPORAN MASUK DARI KOBONG -->
        <section class="admin-section">
            <div class="nav-bar" style="margin-bottom: 15px;">
                <h2>Laporan Kehadiran Masuk</h2>
                
                <!-- DROPDOWN FILTER KOBONG -->
                <div class="filter-box">
                    <label for="filter-kobong" style="font-weight: 600; font-size: 0.9rem;">Filter Kobong: </label>
                    <select id="filter-kobong" style="padding: 6px 12px; border-radius: 6px; border: 1px solid #ccc; font-weight: 600; color: #2e7d32;">
                        <option value="ALL">-- Semua Kobong --</option>
                    </select>
                </div>
            </div>

            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Kobong</th>
                            <th>Status</th>
                            <th>Catatan Santri</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-laporan">
                        <tr>
                            <td colspan="5" class="text-center">Memuat data laporan...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
