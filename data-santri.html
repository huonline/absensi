<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Data Santri Per Kobong</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container container-large">
        <header class="header">
            <div class="nav-bar">
                <h1>Master Data Santri Per Kobong</h1>
                <a href="super-admin.html" class="btn-nav">&larr; Kembali ke Dashboard</a>
            </div>
            <p>Atur data santri berdasarkan nama kobong (Tambah & Hapus Santri)</p>
        </header>

        <!-- FORM INPUT PER KOBONG -->
        <section class="admin-section">
            <h2>Tambah / Update Data Santri Kobong</h2>
            <form id="form-santri-kobong">
                <div class="form-group">
                    <label for="nama-kobong-input">Nama Kobong (Misal: A, B, JADID, QODIM):</label>
                    <input type="text" id="nama-kobong-input" placeholder="Contoh: JADID" required style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
                </div>

                <div class="form-group">
                    <label for="daftar-santri-input">Daftar Nama Santri Baru / Lengkap (1 Nama Per Baris):</label>
                    <textarea id="daftar-santri-input" rows="6" placeholder="Contoh:&#10;Ahmad Subagja&#10;Zaky Mubarok" required></textarea>
                </div>

                <button type="submit" class="btn-submit">Simpan / Tambah ke Kobong</button>
            </form>
        </section>

        <hr class="divider">

        <!-- DISPLAY DAFTAR SANTRI PER KOBONG -->
        <section class="admin-section">
            <h2>Daftar Santri Terdata Per Kobong</h2>
            <div id="container-daftar-kobong">
                <p class="text-center">Memuat data santri per kobong...</p>
            </div>
        </section>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
